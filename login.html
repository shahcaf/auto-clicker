<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Auto Clicker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="dark-theme login-page">
    <div class="login-container glass animate-scale">
        <div class="login-header">
            <div class="logo">
                <i data-lucide="zap" class="icon-bolt"></i>
                <span>Auto Clicker</span>
            </div>
            <h1>Welcome Back</h1>
            <p>Please log in with Discord to access the dashboard and downloads.</p>
        </div>
        
        <div class="login-content">
            <button id="discord-login-btn" class="btn btn-discord btn-block">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.73 4.87a18.2 18.2 0 0 0-4.6-1.44c-.21.37-.4.75-.58 1.14a16.81 16.81 0 0 0-5.1 0c-.18-.39-.37-.77-.58-1.14a18.09 18.09 0 0 0-4.6 1.44c-3.1 4.64-3.93 9.17-2.66 13.62 2.06 1.52 4.05 2.45 5.97 3.05.49-.66.92-1.37 1.3-2.12a12.23 12.23 0 0 1-1.9-.9c.16-.12.31-.24.45-.37 3.75 1.73 7.82 1.73 11.53 0 .14.13.3.25.45.37a12.44 12.44 0 0 1-1.9.9c.38.75.81 1.46 1.3 2.12 1.92-.6 3.91-1.53 5.97-3.05 1.43-5.18.52-9.61-2.66-13.62ZM8.47 14.86c-1.13 0-2.07-1.04-2.07-2.31s.92-2.31 2.07-2.31c1.16 0 2.09 1.04 2.07 2.31.02 1.27-.92 2.31-2.07 2.31Zm7.06 0c-1.13 0-2.07-1.04-2.07-2.31s.92-2.31 2.07-2.31c1.16 0 2.09 1.04 2.07 2.31 0 1.27-.92 2.31-2.07 2.31Z"/>
                </svg>
                Continue with Discord
            </button>
            
            <div class="divider">
                <span>Safe & Secure</span>
            </div>
            
            <p class="login-footer">By logging in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        lucide.createIcons();
        
        document.getElementById('discord-login-btn').addEventListener('click', () => {
            // Simulate Discord Login process
            const btn = document.getElementById('discord-login-btn');
            btn.innerHTML = '<span class="loader"></span> Logging in...';
            btn.style.opacity = '0.7';
            btn.disabled = true;

            setTimeout(() => {
                localStorage.setItem('discord_logged_in', 'true');
                localStorage.setItem('user_name', 'Discord User');
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>
